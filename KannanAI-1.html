<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kannan AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --accent3: #5cf8d0;
    --text: #f0f0ff;
    --muted: #7a7a99;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,92,252,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(252,92,125,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(19,19,26,0.9);
    backdrop-filter: blur(20px);
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    position: relative;
    flex-shrink: 0;
  }

  .avatar::after {
    content: '';
    position: absolute;
    bottom: 1px; right: 1px;
    width: 10px; height: 10px;
    background: var(--accent3);
    border-radius: 50%;
    border: 2px solid var(--bg);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }

  .header-info h1 {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-info p {
    font-size: 11px;
    color: var(--accent3);
  }

  .caps {
    margin-left: auto;
    display: flex;
    gap: 6px;
  }

  .cap {
    background: rgba(124,92,252,0.15);
    border: 1px solid rgba(124,92,252,0.25);
    color: var(--accent);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
  }

  .cap.green {
    background: rgba(92,248,208,0.1);
    border-color: rgba(92,248,208,0.25);
    color: var(--accent3);
  }

  .cap.pink {
    background: rgba(252,92,125,0.1);
    border-color: rgba(252,92,125,0.25);
    color: var(--accent2);
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex;
    gap: 10px;
    max-width: 88%;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.ai { align-self: flex-start; }

  .msg-av {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .msg-av.ai-av { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg-av.user-av { background: linear-gradient(135deg, var(--accent3), #5ca8f8); }

  .bubble {
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.65;
  }

  .message.ai .bubble {
    background: #16162a;
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .message.user .bubble {
    background: linear-gradient(135deg, rgba(124,92,252,0.2), rgba(252,92,125,0.12));
    border: 1px solid rgba(124,92,252,0.3);
    border-top-right-radius: 4px;
  }

  .song-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .song-content {
    background: rgba(124,92,252,0.08);
    border: 1px solid rgba(124,92,252,0.2);
    border-radius: 10px;
    padding: 12px;
    font-style: italic;
    color: #c8c8f0;
    white-space: pre-wrap;
    font-size: 13px;
    line-height: 1.8;
    margin-top: 6px;
  }

  .generated-image {
    max-width: 100%;
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-top: 8px;
    display: block;
  }

  .img-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .search-result {
    background: rgba(92,248,208,0.06);
    border: 1px solid rgba(92,248,208,0.2);
    border-radius: 10px;
    padding: 10px 12px;
    margin-top: 8px;
    font-size: 12.5px;
    color: #a0f0e0;
  }

  .search-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--accent3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
  }

  .quick-actions {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    padding: 0 16px 10px;
    position: relative;
    z-index: 1;
  }

  .quick-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11.5px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .quick-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,92,252,0.1);
  }

  .input-area {
    position: relative;
    z-index: 10;
    padding: 12px 16px 18px;
    border-top: 1px solid var(--border);
    background: rgba(13,13,20,0.95);
    backdrop-filter: blur(20px);
  }

  .input-wrapper {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 9px 9px 9px 14px;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,92,252,0.1);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
  }

  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
    transition: all 0.2s;
  }

  .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 10px 14px;
  }

  .typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .typing span:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }

  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .welcome {
    text-align: center;
    padding: 30px 16px;
    animation: fadeUp 0.5s ease;
  }

  .welcome-emoji { font-size: 44px; margin-bottom: 12px; }

  .welcome h2 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  .welcome p { color: var(--muted); font-size: 13px; max-width: 280px; margin: 0 auto; }

  .feat-pills {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .feat-pill {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
  }

  .error-msg {
    color: var(--accent2);
    font-size: 13px;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">🤖</div>
  <div class="header-info">
    <h1>Kannan AI</h1>
    <p>Powered by Claude • Your personal AI</p>
  </div>
  <div class="caps">
    <span class="cap">🎵 Songs</span>
    <span class="cap green">🔍 Search</span>
    <span class="cap pink">🎨 Images</span>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome">
    <div class="welcome-emoji">🤖✨</div>
    <h2>Kannan AI</h2>
    <p>Chat, songs, web search, image creation — everything in one place!</p>
    <div class="feat-pills">
      <span class="feat-pill">💬 Smart Chat</span>
      <span class="feat-pill">🎵 Song Writing</span>
      <span class="feat-pill">🔍 Web Search</span>
      <span class="feat-pill">🎨 Image Create</span>
    </div>
  </div>
</div>

<div class="quick-actions" id="quickActions">
  <button class="quick-btn" onclick="sendQuick('Oru love song ezhuthi tha 🎵')">🎵 Love Song</button>
  <button class="quick-btn" onclick="sendQuick('Create an image of a beautiful Kerala sunset')">🎨 Create Image</button>
  <button class="quick-btn" onclick="sendQuick('Search: latest AI news today')">🔍 Web Search</button>
  <button class="quick-btn" onclick="sendQuick('Oru funny song tharaamo? 😄')">😄 Funny Song</button>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea 
      id="userInput" 
      placeholder="Chat, songs, search, images... anything! 😊" 
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are Kannan AI — a warm, funny, highly intelligent personal AI assistant created for Kannan. You are powered by Claude.

Your personality:
- Friendly, fun, and conversational like a best friend
- Mix Malayalam and English naturally (Manglish) when user writes in Malayalam/Manglish
- Witty, playful, use emojis naturally
- Very creative at writing songs
- Can answer any question with depth and accuracy

Your capabilities — use these based on what user asks:

1. SONGS: When user asks for a song, write full lyrics with [Verse], [Chorus], [Bridge] etc. Make it beautiful and emotional. Can write in Malayalam, English, or Manglish.

2. WEB SEARCH: When user says "search", "find", "latest news", "what happened", "current" or needs real-time info — respond with: [SEARCH_NEEDED] followed by the search query. Format: [SEARCH_NEEDED]query here

3. IMAGE GENERATION: When user asks to "create image", "generate image", "draw", "make a picture" — respond with: [IMAGE_NEEDED] followed by a detailed English prompt. Format: [IMAGE_NEEDED]detailed image prompt here

4. GENERAL CHAT: For everything else, just be helpful, friendly, and conversational.

Important:
- Always be warm and caring
- Keep responses concise but complete
- For songs, always write the FULL song with proper sections
- You are Kannan's personal AI — treat him like a dear friend
- If someone calls "oooi arunachalaaa" reply "parayoo dear!" 😄`;

let conversationHistory = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendQuick(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function addMessage(role, content) {
  const chatArea = document.getElementById('chatArea');
  const welcome = chatArea.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `message ${role}`;

  const av = document.createElement('div');
  av.className = `msg-av ${role === 'ai' ? 'ai-av' : 'user-av'}`;
  av.textContent = role === 'ai' ? '🤖' : '😊';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (typeof content === 'string') {
    bubble.textContent = content;
  } else {
    // Rich content object
    if (content.text) {
      const p = document.createElement('p');
      p.textContent = content.text;
      bubble.appendChild(p);
    }
    if (content.song) {
      const lbl = document.createElement('div');
      lbl.className = 'song-label';
      lbl.textContent = '🎵 Song Lyrics';
      const sc = document.createElement('div');
      sc.className = 'song-content';
      sc.textContent = content.song;
      bubble.appendChild(lbl);
      bubble.appendChild(sc);
    }
    if (content.searchResult) {
      const lbl = document.createElement('div');
      lbl.className = 'search-label';
      lbl.textContent = '🔍 Web Search Result';
      const sr = document.createElement('div');
      sr.className = 'search-result';
      sr.textContent = content.searchResult;
      bubble.appendChild(lbl);
      bubble.appendChild(sr);
    }
    if (content.imageUrl) {
      const lbl = document.createElement('div');
      lbl.className = 'img-label';
      lbl.textContent = '🎨 Generated Image';
      const img = document.createElement('img');
      img.src = content.imageUrl;
      img.className = 'generated-image';
      img.alt = 'Generated image';
      bubble.appendChild(lbl);
      bubble.appendChild(img);
    }
    if (content.error) {
      const e = document.createElement('p');
      e.className = 'error-msg';
      e.textContent = content.error;
      bubble.appendChild(e);
    }
  }

  div.appendChild(av);
  div.appendChild(bubble);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addTyping() {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typingIndicator';
  const av = document.createElement('div');
  av.className = 'msg-av ai-av';
  av.textContent = '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  div.appendChild(av);
  div.appendChild(bubble);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function generateImage(prompt) {
  // Use Pollinations AI - completely free, no API key needed
  const encodedPrompt = encodeURIComponent(prompt + ', high quality, detailed, beautiful');
  const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=512&height=512&nologo=true`;
  return imageUrl;
}

async function doWebSearch(query) {
  // Use Claude's web search capability via API
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: 'user', content: `Search the web and answer: ${query}. Give a concise summary of what you find.` }]
      })
    });
    const data = await response.json();
    const textBlocks = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
    return textBlocks || 'Search complete! Here is what I found.';
  } catch(e) {
    return 'Web search cheyyan kzhinjilla. Try again! 😅';
  }
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('quickActions').style.display = 'none';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  addTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.content && data.content[0]) {
      let reply = data.content[0].text;
      conversationHistory.push({ role: 'assistant', content: reply });

      // Check for special actions
      if (reply.includes('[IMAGE_NEEDED]')) {
        const promptMatch = reply.match(/\[IMAGE_NEEDED\](.*?)(?:\n|$)/s);
        const imgPrompt = promptMatch ? promptMatch[1].trim() : text;
        const beforeText = reply.replace(/\[IMAGE_NEEDED\].*$/s, '').trim();

        addMessage('ai', { text: beforeText || '🎨 Oru image create cheyyunn! Oru nimisham... ✨' });
        addTyping();

        const imageUrl = await generateImage(imgPrompt);
        removeTyping();
        addMessage('ai', { imageUrl, text: 'Itho ninakkayi! 🎨✨' });

      } else if (reply.includes('[SEARCH_NEEDED]')) {
        const queryMatch = reply.match(/\[SEARCH_NEEDED\](.*?)(?:\n|$)/s);
        const searchQuery = queryMatch ? queryMatch[1].trim() : text;
        const beforeText = reply.replace(/\[SEARCH_NEEDED\].*$/s, '').trim();

        addMessage('ai', { text: beforeText || `🔍 "${searchQuery}" search cheyyunn...` });
        addTyping();

        const searchResult = await doWebSearch(searchQuery);
        removeTyping();
        addMessage('ai', { searchResult });

      } else {
        // Check for song content
        const hasSong = reply.includes('[Verse') || reply.includes('[Chorus') || reply.includes('[Bridge');
        
        if (hasSong) {
          const lines = reply.split('\n');
          let intro = [], song = [], inSong = false;
          for (const line of lines) {
            if (!inSong && line.match(/^\[/)) inSong = true;
            if (inSong) song.push(line);
            else intro.push(line);
          }
          addMessage('ai', {
            text: intro.join('\n').trim(),
            song: song.join('\n').trim()
          });
        } else {
          addMessage('ai', reply);
        }
      }
    }
  } catch (err) {
    removeTyping();
    addMessage('ai', 'Oops! Oru chinna problem 😅 Try again cheyyoo!');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}
</script>
</body>
</html>
